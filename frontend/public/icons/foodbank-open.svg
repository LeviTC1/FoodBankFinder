  <circle cx="16" cy="14.2" r="5.6" fill="#052E16" stroke="#BBF7D0" stroke-width="1.1" />
  <path d="M12.8 14.2L15 16.4L19.2 12.2" stroke="#4ADE80" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
